name: Weekly Newsletter Generation

on:
  schedule:
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate newsletter
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        python generate_newsletter.py
    
    - name: Upload to Box
      run: |
        DATE=$(date +'%Y-%m-%d')
        FILENAME="newsletter_${DATE}.html"
        
        curl -X POST https://upload.box.com/api/2.0/files/content \
          -H "Authorization: Bearer ${{ secrets.BOX_ACCESS_TOKEN }}" \
          -F "attributes={\"name\":\"${FILENAME}\", \"parent\":{\"id\":\"362567737269\"}}" \
          -F "file=@output/newsletter_${DATE}.html"
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Upload newsletter artifacts
      uses: actions/upload-artifact@v4
      with:
        name: newsletter-${{ steps.date.outputs.date }}
        path: |
          output/newsletter_*.html
          output/newsletter_content_*.txt
        retention-days: 90
    
    - name: Commit generated files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/
        git diff --quiet && git diff --staged --quiet || git commit -m "Newsletter generated for ${{ steps.date.outputs.date }}"
        git push
      continue-on-error: true
